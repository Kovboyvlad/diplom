<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a45"/>
    </marker>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #1f2933; }
      .box { fill: #ffffff; stroke: #2f3a45; stroke-width: 2.2; rx: 10; }
      .box-soft { fill: #f4f7fb; stroke: #2f3a45; stroke-width: 2.2; rx: 10; }
      .box-accent { fill: #eef6f0; stroke: #2f3a45; stroke-width: 2.2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 22px; fill: #1f2933; }
      .small { font-family: Arial, sans-serif; font-size: 18px; fill: #4b5563; }
      .arrow { stroke: #2f3a45; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .group-label { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #374151; }
    </style>
  </defs>

  <rect x="20" y="20" width="1560" height="580" fill="#ffffff"/>
  <text x="800" y="60" text-anchor="middle" class="title">Последовательность работы комплексного режима генерации UML-диаграмм</text>

  <rect x="60" y="130" width="180" height="96" class="box"/>
  <text x="150" y="166" text-anchor="middle" class="text">Входной текст</text>
  <text x="150" y="195" text-anchor="middle" class="text">требований</text>

  <path d="M 240 178 L 300 178" class="arrow"/>

  <rect x="300" y="118" width="210" height="120" class="box-soft"/>
  <text x="405" y="156" text-anchor="middle" class="text">Извлечение</text>
  <text x="405" y="185" text-anchor="middle" class="text">атомарных фактов</text>
  <text x="405" y="213" text-anchor="middle" class="small">REQ-001, REQ-002, ...</text>

  <path d="M 510 178 L 570 178" class="arrow"/>

  <rect x="570" y="118" width="220" height="120" class="box-soft"/>
  <text x="680" y="156" text-anchor="middle" class="text">Формирование</text>
  <text x="680" y="185" text-anchor="middle" class="text">проектного</text>
  <text x="680" y="214" text-anchor="middle" class="text">контекста</text>

  <path d="M 790 178 L 850 178" class="arrow"/>

  <rect x="850" y="118" width="230" height="120" class="box-soft"/>
  <text x="965" y="156" text-anchor="middle" class="text">Распределение</text>
  <text x="965" y="185" text-anchor="middle" class="text">фактов по</text>
  <text x="965" y="214" text-anchor="middle" class="text">представлениям</text>

  <path d="M 1080 178 L 1140 178" class="arrow"/>

  <rect x="1140" y="90" width="360" height="205" class="box-accent"/>
  <text x="1320" y="127" text-anchor="middle" class="group-label">Генерация UML-представлений</text>

  <rect x="1170" y="150" width="145" height="50" class="box"/>
  <text x="1242.5" y="182" text-anchor="middle" class="small">Классовая</text>

  <rect x="1325" y="150" width="145" height="50" class="box"/>
  <text x="1397.5" y="182" text-anchor="middle" class="small">Послед.</text>

  <rect x="1170" y="220" width="145" height="50" class="box"/>
  <text x="1242.5" y="252" text-anchor="middle" class="small">Компон.</text>

  <rect x="1325" y="220" width="145" height="50" class="box"/>
  <text x="1397.5" y="252" text-anchor="middle" class="small">Деят.</text>

  <path d="M 1320 295 L 1320 350" class="arrow"/>

  <rect x="1135" y="350" width="370" height="92" class="box-soft"/>
  <text x="1320" y="387" text-anchor="middle" class="text">Проверка трассируемости</text>
  <text x="1320" y="417" text-anchor="middle" class="text">и согласованности</text>

  <path d="M 1135 396 L 1030 396" class="arrow"/>

  <rect x="760" y="350" width="270" height="92" class="box"/>
  <text x="895" y="387" text-anchor="middle" class="text">Сохранение</text>
  <text x="895" y="417" text-anchor="middle" class="text">результатов</text>

  <path d="M 850 350 C 760 300, 685 280, 680 238" class="arrow"/>
  <text x="735" y="310" text-anchor="middle" class="small">единый контекст</text>

  <path d="M 965 238 C 965 285, 1060 310, 1185 350" class="arrow"/>
  <text x="1052" y="300" text-anchor="middle" class="small">комментарии трассировки</text>

  <text x="895" y="480" text-anchor="middle" class="small">История генераций, метрики, PlantUML, SVG/PNG</text>
</svg>
